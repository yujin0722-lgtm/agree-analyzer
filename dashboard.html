<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGREE II 診療ガイドライン評価集計ダッシュボード</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
    body {
      font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
    }
    .gradient-bg {
      background: linear-gradient(135deg, #f0fdfa 0%, #e0f2fe 100%);
    }
    .card-shadow {
      box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 4px 12px -3px rgba(0, 0, 0, 0.03);
    }
  </style>
</head>
<body class="gradient-bg min-h-screen text-slate-800 antialiased pb-20">

  <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-30 transition-all">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <div class="bg-emerald-500 text-white p-2 rounded-xl">
          <i data-lucide="activity" class="w-6 h-6"></i>
        </div>
        <div>
          <h1 class="text-lg font-bold text-slate-900 tracking-tight">AGREE II 評価集計アナライザー</h1>
          <p class="text-xs text-slate-500">診療ガイドライン方法論的質評価システム</p>
        </div>
      </div>
      <div class="flex items-center space-x-3">
        <span class="text-xs bg-slate-100 text-slate-600 px-3 py-1.5 rounded-full font-medium border border-slate-200/50 flex items-center gap-1">
          <i data-lucide="shield-check" class="w-3.5 h-3.5 text-emerald-500"></i>
          完全ローカル処理（セキュリティ保護）
        </span>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
    
    <section class="mb-8">
      <div class="bg-white rounded-2xl p-6 card-shadow border border-slate-100 transition-all hover:border-slate-200">
        <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-400 mb-4 flex items-center gap-2">
          <i data-lucide="upload-cloud" class="w-4 h-4"></i>
          データインポート
        </h2>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-center">
          <div class="md:col-span-2">
            <div id="dropZone" class="border-2 border-dashed border-slate-200 hover:border-emerald-500/50 rounded-xl p-8 text-center cursor-pointer bg-slate-50/50 hover:bg-slate-50 transition-all duration-200 group">
              <input type="file" id="fileInput" accept=".csv" class="hidden">
              <i data-lucide="file-text" class="w-10 h-10 text-slate-400 group-hover:text-emerald-500 mx-auto mb-3 transition-colors"></i>
              <p class="text-sm font-semibold text-slate-700">スプレッドシートからダウンロードしたCSVをここにドロップ</p>
              <p class="text-xs text-slate-400 mt-1">または、ここをクリックしてファイルを選択</p>
            </div>
          </div>
          
          <div class="bg-slate-50/80 border border-slate-100 rounded-xl p-5 text-center">
            <i data-lucide="sparkles" class="w-6 h-6 text-amber-500 mx-auto mb-2 animate-bounce"></i>
            <h3 class="text-sm font-bold text-slate-800 mb-1">テスト用デモデータ</h3>
            <p class="text-xs text-slate-500 mb-4">実際のCSVファイルがなくても、表記揺れ補正＆複数ガイドラインの切り替え機能を今すぐお試しいただけます。</p>
            <button onclick="loadSampleData()" class="w-full bg-slate-900 hover:bg-slate-800 text-white text-xs font-semibold py-2.5 px-4 rounded-lg shadow-sm transition-all flex items-center justify-center gap-1.5">
              サンプルデモデータを読み込む
            </button>
          </div>
        </div>
      </div>
    </section>

    <div id="emptyState" class="bg-white rounded-2xl p-16 text-center card-shadow border border-slate-100 my-12">
      <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-6 border border-slate-100">
        <i data-lucide="pie-chart" class="w-10 h-10 text-slate-300"></i>
      </div>
      <h3 class="text-lg font-bold text-slate-800 mb-2">評価データがロードされていません</h3>
      <p class="text-sm text-slate
